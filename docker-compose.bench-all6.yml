    ports:
      - "8017:8017"
    command: ["--kv-cache-dtype", "fp8"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    shm_size: '16gb'

