# ============================================================================
# Full 6-model showdown — MoE x3 vs Dense x3
# GPU 0: RedHatAI Gemma4-26B MoE (official)      port 8016
# GPU 1: Huihui Gemma4-26B MoE (abliterated)     port 8017
# GPU 2: Jiunsong SuperGemma4-26B MoE (enhanced) port 8018
# GPU 3: Qwen3.5-27B Dense                        port 8019
# GPU 4: Qwopus3.5-27B Dense (Opus distilled)    port 8020
# GPU 5: Gemma4-31B Dense                         port 8021
# All: FP8 KV, 128K context
# ============================================================================

services:

  moe-redhat:
    image: lna-lab/gemma4-inference:latest
    container_name: moe-redhat
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - MODEL_PATH=/models/current
      - PORT=8016
      - MAX_MODEL_LEN=131072
      - MAX_NUM_SEQS=16
      - GPU_MEMORY_UTILIZATION=0.95
      - TENSOR_PARALLEL_SIZE=1
      - QUANTIZATION=auto
      - VLLM_CUDA_GRAPH_MODE=piecewise
      - TRINITY_TURBO_ENABLED=0
    volumes:
      - /media/tonoken/Optane_DATA/Models/RedHatAI/gemma-4-26B-A4B-it-NVFP4:/models/current:ro
    ports:
      - "8016:8016"
    command: ["--kv-cache-dtype", "fp8"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    shm_size: '16gb'

  moe-huihui:
    image: lna-lab/gemma4-inference:latest
    container_name: moe-huihui
    runtime: nvidia
